    <text x="100" y="158" text-anchor="middle" dominant-baseline="central" font-family="Georgia, serif" font-size="68" font-weight="700" letter-spacing="6" opacity="0.95" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.95;font-family:Georgia, serif;font-size:68px;font-weight:700;text-anchor:middle;dominant-baseline:central">CPA</text>

    <!-- Baseline rule -->
    <rect x="18" y="193" width="164" height="2.5" rx="1.5" opacity="0.5" style="fill:rgb(55, 138, 221);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

